services:
  verdaccio:
    build: .
    container_name: verdaccio
    restart: unless-stopped
    ports:
      - "4873:4873"
    volumes:
      - ./config.yaml:/verdaccio/conf/config.yaml:ro
      - verdaccio_plugins:/verdaccio/plugins
      - verdaccio_storage:/verdaccio/storage
    environment:
      - VERDACCIO_PORT=4873
      - VERDACCIO_PUBLIC_URL=https://npm.havokhound.co.uk
      - VERDACCIO_LDAP_BIND_PASSWORD=${LLDAP_LDAP_USER_PASS}
    networks:
      - default
      - auth-net

networks:
  auth-net:
    external: true

volumes:
  verdaccio_plugins:
    driver: local

  verdaccio_storage:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=192.168.50.64,rw,nfsvers=4,hard,intr"
      device: ":/volume1/registry/npm"
